<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zenith Tutorial — Fee Management System</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>
<body>

<div id="login-page" class="page active">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-mark">
        <svg viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M19 4L4 12v6c0 9.4 6.4 18.2 15 20.5C28.6 36.2 35 27.4 35 18v-6L19 4z" fill="rgba(255,255,255,0.15)" stroke="white" stroke-width="1.5"/>
          <path d="M13 19h12M19 13v12M16 16l6 6M22 16l-6 6" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="logo-school-name">Zenith Tutorial</div>
      <div class="logo-tagline">Fee Record Management System</div>
    </div>

    <div class="login-title">Administrator Sign In</div>
    <div class="login-subtitle">Access is restricted to authorized personnel only.</div>

    <div id="login-error" class="error-msg hidden">
      Invalid email or password. Please try again.
    </div>

    <div class="form-group">
      <label class="form-label">Email Address</label>
      <div class="input-with-icon">
        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 4H4a2 2 0 00-2 2v12a2 2 0 002 2h16a2 2 0 002-2V6a2 2 0 00-2-2z"/>
          <path d="M22 6l-10 7L2 6"/>
        </svg>
        <input type="email" class="form-input" id="login-email" placeholder="admin@tutorial.edu" autocomplete="email">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Password</label>
      <div class="input-with-icon">
        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0110 0v4"/>
        </svg>
        <input type="password" class="form-input" id="login-password" placeholder="••••••••" autocomplete="current-password">
      </div>
    </div>

    <button class="btn-primary" id="login-btn">Sign In to Dashboard</button>

    <div class="login-footer">
      EduLedger v2.1 &nbsp;·&nbsp; Secured by Supabase<br>
      &copy; 2026 Zenith Tutorial. All rights reserved.
    </div>
  </div>
</div>

<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./supabase.js"></script>
<script>
  // ── Check if already logged in, redirect to dashboard ──
  (async function() {
    const { data: { session } } = await supabase.auth.getSession();
    if (session) {
      window.location.href = './main.html';
    }
  })();

  // ── Login button ──
  document.getElementById('login-btn').addEventListener('click', async function () {
    const email    = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    const errorEl  = document.getElementById('login-error');
    const btn      = document.getElementById('login-btn');

    errorEl.classList.add('hidden');

    if (!email || !password) {
      errorEl.textContent = 'Please enter your email and password.';
      errorEl.classList.remove('hidden');
      return;
    }

    btn.textContent = 'Signing in...';
    btn.disabled = true;

    const { data, error } = await supabase.auth.signInWithPassword({ email, password });

    if (error) {
      errorEl.textContent = 'Invalid email or password. Please try again.';
      errorEl.classList.remove('hidden');
      btn.textContent = 'Sign In to Dashboard';
      btn.disabled = false;
    } else {
      // Login success — go to dashboard
      window.location.href = './main.html';
    }
  });

  // Allow Enter key
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('login-btn').click();
  });
</script>

</body>
</html>
